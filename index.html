<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ciao Mimma!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --accent: #e8c97e;
      --accent2: #c0392b;
      --text: #f0ece4;
      --muted: #888;
      --border: rgba(232,201,126,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Background atmosphere */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(232,201,126,0.07) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.06) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 10s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 420px;
      width: 100%;
      padding: 48px 36px 40px;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .deco-line {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 28px;
      border-radius: 2px;
      animation: expand 1s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
      transform: scaleX(0);
    }
    @keyframes expand {
      to { transform: scaleX(1); }
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 0.6s 0.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 5vw, 28px);
      line-height: 1.5;
      text-align: center;
      color: var(--text);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.8s 0.7s ease forwards;
    }

    .message em {
      color: var(--accent);
      font-style: italic;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 0.8s 0.9s ease forwards;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      animation: fadeIn 0.8s 1.1s ease forwards;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      letter-spacing: 0.3px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-call {
      background: var(--accent);
      color: #0d0d0d;
      box-shadow: 0 8px 30px rgba(232,201,126,0.25);
    }
    .btn-call:hover {
      filter: brightness(1.1);
      box-shadow: 0 12px 40px rgba(232,201,126,0.35);
      transform: translateY(-2px);
    }

    .btn-yt {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-yt:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }

    .btn-vinted {
      background: #09B1A6;
      color: #fff;
      box-shadow: 0 8px 30px rgba(9,177,166,0.25);
    }
    .btn-vinted:hover {
      filter: brightness(1.1);
      box-shadow: 0 12px 40px rgba(9,177,166,0.35);
      transform: translateY(-2px);
    }

    .icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeIn 1s 1.4s ease forwards;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="deco-line"></div>
    <p class="label">Un messaggio per te</p>

    <!-- ✏️ MODIFICA QUI il tuo messaggio principale -->
    <h1 class="message">
      E' il momento di fare una pausa Mimma!
    </h1>

    <!-- ✏️ MODIFICA QUI il testo secondario -->
    <p class="sub">
      Sappi che il tuo Mimmo ti pensa sempre e non vede l'ora di andare con la sua mimma a Monterosso<br>
      Ora torniamo a noi, che cosa vuoi fare? 
    </p>

    <div class="buttons">

      <!-- ✏️ MODIFICA il numero di telefono: sostituisci +39XXXXXXXXXX -->
      <a class="btn btn-call" href="tel:+393458472669">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        Chiama Mimmo!
      </a>

      <!-- ✏️ MODIFICA il link YouTube: sostituisci XXXXXXXXXXX con l'ID del video -->
      <a class="btn btn-yt" href="https://www.youtube.com/watch?v=TY8ULqPXErs" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/>
        </svg>
        Ascolta LA canzone
      </a>

      <!-- Apre Vinted: se l'app è installata si apre direttamente, altrimenti va al sito -->
      <a class="btn btn-vinted" href="vinted:///" onclick="setTimeout(()=>{ window.location='https://www.vinted.it' },800)" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 2c4.418 0 8 3.582 8 8s-3.582 8-8 8-8-3.582-8-8 3.582-8 8-8zm-1.5 4v4H7l5 6 5-6h-3.5V8h-3z"/>
        </svg>
        Scrollatina su Vinted
      </a>

    </div>

    <p class="footer">con affetto il tuo Mimmo</p>
  </div>
</body>
</html>
